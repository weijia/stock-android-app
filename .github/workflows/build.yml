name: Build and Upload APK to SFTP

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write  # 允许推送代码

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '7.5'

    - name: Update version before build
      id: version
      run: |
        # 读取原始 versionName
        BASE_VERSION=$(grep "versionName" app/build.gradle | head -1 | sed 's/.*versionName *"\([^"]*\)".*/\1/')
        BUILD_NUMBER=${{ github.run_number }}
        
        # 生成新的 versionName：原始版本 + build 号
        NEW_VERSION_NAME="${BASE_VERSION}.${BUILD_NUMBER}"
        
        # 使用 Python 更新版本号（\x22 = "，彻底避免引号和转义问题）
        python3 -c "import re;c=open('app/build.gradle').read();c=re.sub('versionCode\s+\d+','versionCode ${BUILD_NUMBER}',c);c=re.sub('versionName\s+\x22[^\x22]+\x22','versionName \x22${NEW_VERSION_NAME}\x22',c);open('app/build.gradle','w').write(c)"
        
        # 显示更新后的版本信息
        echo "=== Updated version info ==="
        grep -E "(versionCode|versionName)" app/build.gradle
        echo "============================"
        
        echo "version_name=${NEW_VERSION_NAME}" >> $GITHUB_OUTPUT
        echo "base_version=${BASE_VERSION}" >> $GITHUB_OUTPUT
        echo "build_number=${BUILD_NUMBER}" >> $GITHUB_OUTPUT
        echo "apk_name=stock-app-v${NEW_VERSION_NAME}.apk" >> $GITHUB_OUTPUT
        echo "Version: ${NEW_VERSION_NAME}, Build: ${BUILD_NUMBER}"

    - name: Setup Release Keystore and Build
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        if [ -n "$KEYSTORE_BASE64" ]; then
          echo "Building Release APK with keystore..."
          echo "$KEYSTORE_BASE64" | base64 -d > app/release-key.jks
          export KEYSTORE_PATH=release-key.jks
          gradle assembleRelease
          echo "APK_TYPE=release" >> $GITHUB_ENV
        else
          echo "Building Debug APK (no keystore secrets configured)..."
          gradle assembleDebug
          echo "APK_TYPE=debug" >> $GITHUB_ENV
        fi

    - name: List APK files
      run: |
        echo "APK files in release directory:"
        ls -la app/build/outputs/apk/release/ || echo "No release directory"
        echo "APK files in debug directory:"
        ls -la app/build/outputs/apk/debug/ || echo "No debug directory"

    - name: Rename APK with version
      run: |
        # 使用 Release APK（如果存在），否则使用 Debug APK
        if [ -f "app/build/outputs/apk/release/app-release.apk" ]; then
          cp app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/${{ steps.version.outputs.apk_name }}
          echo "APK_TYPE=release" >> $GITHUB_ENV
        else
          cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/${{ steps.version.outputs.apk_name }}
          echo "APK_TYPE=debug" >> $GITHUB_ENV
        fi

    - name: Upload APK to SFTP
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: weijia/action-upload-sftp@master
      with:
        sftp-host: ${{ secrets.SFTP_HOST }}
        sftp-port: ${{ secrets.SFTP_PORT }}
        sftp-username: ${{ secrets.SFTP_USERNAME }}
        sftp-password: ${{ secrets.SFTP_PASSWORD }}
        source-path: app/build/outputs/apk/${{ env.APK_TYPE }}/${{ steps.version.outputs.apk_name }}
        remote-path: /home/github/apps/stock-android-app/${{ steps.version.outputs.apk_name }}
        cleanup-old-files: 'true'
        max-keep-files: 5

    - name: Upload APK (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: app-${{ env.APK_TYPE }}
        path: app/build/outputs/apk/${{ env.APK_TYPE }}/${{ steps.version.outputs.apk_name }}

    - name: Commit version update
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add app/build.gradle
        
        if git diff --cached --quiet; then
          echo "No changes to commit"
        else
          git commit -m "[skip ci] Build #${BUILD_NUMBER}: versionCode=${BUILD_NUMBER}, versionName=${VERSION_NAME}"
          git push origin HEAD:main
        fi
      env:
        BUILD_NUMBER: ${{ steps.version.outputs.build_number }}
        VERSION_NAME: ${{ steps.version.outputs.version_name }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create Release on tag
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: app/build/outputs/apk/${{ env.APK_TYPE }}/${{ steps.version.outputs.apk_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}