name: Build and Upload APK to SFTP

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '7.5'

    - name: Build Debug APK
      run: gradle assembleDebug

    - name: Get version info
      id: version
      run: |
        VERSION_NAME=$(grep "versionName" app/build.gradle | head -1 | sed 's/.*versionName *"\([^"]*\)".*/\1/')
        BUILD_NUMBER=${{ github.run_number }}
        echo "version_name=${VERSION_NAME}" >> $GITHUB_OUTPUT
        echo "build_number=${BUILD_NUMBER}" >> $GITHUB_OUTPUT
        echo "apk_name=stock-app-v${VERSION_NAME}-build${BUILD_NUMBER}.apk" >> $GITHUB_OUTPUT
        echo "Version: ${VERSION_NAME}, Build: ${BUILD_NUMBER}"

    - name: List APK files
      run: |
        echo "APK files in debug directory:"
        ls -la app/build/outputs/apk/debug/
        echo "APK files in release directory:"
        ls -la app/build/outputs/apk/release/ || echo "No release directory"

    - name: Rename APK with version
      run: |
        # 使用 Debug APK
        cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/${{ steps.version.outputs.apk_name }}

    - name: Upload APK to SFTP
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: weijia/action-upload-sftp@master
      with:
        sftp-host: ${{ secrets.SFTP_HOST }}
        sftp-port: ${{ secrets.SFTP_PORT }}
        sftp-username: ${{ secrets.SFTP_USERNAME }}
        sftp-password: ${{ secrets.SFTP_PASSWORD }}
        source-path: app/build/outputs/apk/debug/${{ steps.version.outputs.apk_name }}
        remote-path: /home/github/apps/stock-android-app/${{ steps.version.outputs.apk_name }}
        cleanup-old-files: 'true'
        max-keep-files: 5

    - name: Upload Debug APK (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/${{ steps.version.outputs.apk_name }}

    - name: Create Release on tag
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: app/build/outputs/apk/debug/${{ steps.version.outputs.apk_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}