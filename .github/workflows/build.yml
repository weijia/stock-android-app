name: Build and Upload APK to SFTP

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write  # 允许推送代码

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '7.5'

    - name: Update versionCode before build
      id: version
      run: |
        VERSION_NAME=$(grep "versionName" app/build.gradle | head -1 | sed 's/.*versionName *"\([^"]*\)".*/\1/')
        BUILD_NUMBER=${{ github.run_number }}
        
        # 在构建之前更新 versionCode，确保递增
        sed -i "s/versionCode [0-9]*/versionCode ${BUILD_NUMBER}/" app/build.gradle
        
        # 显示更新后的 versionCode
        echo "Updated versionCode:"
        grep "versionCode" app/build.gradle
        
        echo "version_name=${VERSION_NAME}" >> $GITHUB_OUTPUT
        echo "build_number=${BUILD_NUMBER}" >> $GITHUB_OUTPUT
        echo "apk_name=stock-app-v${VERSION_NAME}-build${BUILD_NUMBER}.apk" >> $GITHUB_OUTPUT
        echo "Version: ${VERSION_NAME}, Build: ${BUILD_NUMBER}"

    - name: Setup Release Keystore and Build
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        if [ -n "$KEYSTORE_BASE64" ]; then
          echo "Building Release APK with keystore..."
          echo "$KEYSTORE_BASE64" | base64 -d > app/release-key.jks
          export KEYSTORE_PATH=release-key.jks
          gradle assembleRelease
          echo "APK_TYPE=release" >> $GITHUB_ENV
        else
          echo "Building Debug APK (no keystore)..."
          gradle assembleDebug
          echo "APK_TYPE=debug" >> $GITHUB_ENV
        fi

    - name: List APK files
      run: |
        echo "APK files in release directory:"
        ls -la app/build/outputs/apk/release/ || echo "No release directory"
        echo "APK files in debug directory:"
        ls -la app/build/outputs/apk/debug/ || echo "No debug directory"

    - name: Rename APK with version
      run: |
        # 使用 Release APK（如果存在），否则使用 Debug APK
        if [ -f "app/build/outputs/apk/release/app-release.apk" ]; then
          cp app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/${{ steps.version.outputs.apk_name }}
          echo "APK_TYPE=release" >> $GITHUB_ENV
        else
          cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/${{ steps.version.outputs.apk_name }}
          echo "APK_TYPE=debug" >> $GITHUB_ENV
        fi

    - name: Upload APK to SFTP
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: weijia/action-upload-sftp@master
      with:
        sftp-host: ${{ secrets.SFTP_HOST }}
        sftp-port: ${{ secrets.SFTP_PORT }}
        sftp-username: ${{ secrets.SFTP_USERNAME }}
        sftp-password: ${{ secrets.SFTP_PASSWORD }}
        source-path: app/build/outputs/apk/${{ env.APK_TYPE }}/${{ steps.version.outputs.apk_name }}
        remote-path: /home/github/apps/stock-android-app/${{ steps.version.outputs.apk_name }}
        cleanup-old-files: 'true'
        max-keep-files: 5

    - name: Upload APK (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: app-${{ env.APK_TYPE }}
        path: app/build/outputs/apk/${{ env.APK_TYPE }}/${{ steps.version.outputs.apk_name }}

    - name: Commit versionCode update
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add app/build.gradle
        git commit -m "[skip ci] Update versionCode to ${BUILD_NUMBER}" || echo "No changes to commit"
        git push origin HEAD:main
      env:
        BUILD_NUMBER: ${{ steps.version.outputs.build_number }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create Release on tag
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: app/build/outputs/apk/${{ env.APK_TYPE }}/${{ steps.version.outputs.apk_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}